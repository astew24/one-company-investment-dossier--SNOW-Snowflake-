<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snowflake Research Dossier | Live Portfolio Demo</title>
  <meta
    name="description"
    content="Live portfolio presentation of a Snowflake single-name equity research workflow, including thesis framing, scenario analysis, monitoring triggers, and supporting artifacts."
  >
  <meta name="theme-color" content="oklch(60% 0.25 350)">
  <meta property="og:title" content="Snowflake Research Dossier">
  <meta
    property="og:description"
    content="Single-name equity research walkthrough covering thesis, scenario framing, KPI monitoring, and the underlying memo, tracker, and model files."
  >
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://astew24.github.io/one-company-investment-dossier--SNOW-Snowflake-/">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,600&family=Instrument+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Impeccable Color Tokens */
      --warm-ash-cream: oklch(96% 0.005 350);
      --warm-ash-cream-dark: oklch(92% 0.005 350);
      --deep-graphite: oklch(10% 0 0);
      --soft-charcoal: oklch(25% 0 0);
      --editorial-magenta: oklch(60% 0.25 350);
      --paper-mist: oklch(85% 0.005 350);
      
      /* Magazine Spacing Scale */
      --space-8: 8px;
      --space-16: 16px;
      --space-24: 24px;
      --space-32: 32px;
      --space-48: 48px;
      --space-80: 80px;
      --space-120: 120px;

      /* Semantic mappings */
      --ink: var(--deep-graphite);
      --muted: var(--soft-charcoal);
      --accent: var(--editorial-magenta);
      --line: var(--paper-mist);
      --radius: 0; /* Sharp signatures rule */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background-color: var(--warm-ash-cream);
      color: var(--ink);
      font-family: "Instrument Sans", system-ui, sans-serif;
      line-height: 1.6;
      padding: var(--space-24);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .page-shell {
      max-width: 1180px;
      margin: 0 auto;
    }

    .mono {
      font-family: "Space Grotesk", monospace;
    }

    .surface {
      background: transparent;
      border: none;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: var(--space-48) 0;
      margin-bottom: var(--space-48);
      border-bottom: 2px solid var(--ink);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: var(--space-80);
      align-items: start;
    }

    /* Remove the 'boxy' look from the panel */
    .hero-panel {
      position: relative;
      background: transparent;
      border: none;
      border-left: 1px solid var(--line);
      padding: 0 0 0 var(--space-32);
      display: grid;
      gap: var(--space-24);
    }

    .meta-card {
      padding: var(--space-16) 0;
      border: none;
      border-top: 1px solid var(--line);
      background: transparent;
    }

    .section {
      margin-bottom: var(--space-80);
      padding: 0;
      background: transparent;
    }

    .section-head {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: start;
      gap: var(--space-80);
      margin-bottom: var(--space-48);
      border-bottom: 2px solid var(--ink);
      padding-bottom: var(--space-24);
    }

    .grid-four {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-32);
    }

    .feature-card,
    .rail-card,
    .deliverable-card {
      border: none;
      border-top: 1px solid var(--line);
      background: transparent;
      padding: var(--space-24) 0;
    }

    /* Remove the 'app' look from buttons */
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0;
      margin-right: var(--space-24);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--ink);
      color: var(--ink);
      font-family: "Space Grotesk", monospace;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: 0;
      transition: border-color 0.2s;
    }

    .button:hover {
      transform: none;
      border-bottom-color: var(--accent);
      color: var(--accent);
    }

    .button-primary {
      background: transparent;
      color: var(--ink);
      font-weight: 600;
    }

    .scenario-rail,
    .scenario-output,
    .monitor-panel {
      border: none;
      background: transparent;
      padding: 0;
    }

    .scenario-button {
      border: none;
      border-bottom: 1px solid var(--line);
      padding: var(--space-16) 0;
      background: transparent;
    }

    .scenario-button.active {
      border-left: none;
      border-bottom: 2px solid var(--accent);
    }

    .metric-card {
      padding: var(--space-16) 0;
      border: none;
      border-top: 1px solid var(--line);
      background: transparent;
    }

    .implication {
      border: none;
      border-top: 2px solid var(--ink);
      background: var(--warm-ash-cream-dark);
      padding: var(--space-32);
    }

    .trigger-card {
      border: none;
      border-top: 1px solid var(--line);
      background: transparent;
      padding: var(--space-24) 0;
    }

    .trigger-meta div {
      background: transparent;
      border: none;
      border-left: 1px solid var(--line);
      padding: 0 0 0 var(--space-16);
    }
